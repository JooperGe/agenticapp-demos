<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>拾光 Lumio</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

<!-- ═══ 登录视图 ═══ -->
<div id="view-login" class="view">
  <div class="brand-header">
    <div class="brand-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M9 7h6M9 11h4" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <div class="brand-text">
      <div class="brand-name">拾光</div>
      <div class="brand-sub">让好内容，在对的时刻找到你</div>
    </div>
  </div>

  <div class="login-body">
    <div class="login-title">微信扫码登录</div>
    <div class="login-hint">首次登录即完成注册，无需额外操作</div>

    <div class="qr-wrap">
      <!-- 模拟二维码 SVG -->
      <div class="qr-box">
        <svg id="qr-svg" width="130" height="130" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
          <!-- 定位块 -->
          <rect x="8"  y="8"  width="30" height="30" rx="4" fill="#1C1917"/>
          <rect x="13" y="13" width="20" height="20" rx="2" fill="white"/>
          <rect x="17" y="17" width="12" height="12" rx="1.5" fill="#1C1917"/>
          <rect x="92" y="8"  width="30" height="30" rx="4" fill="#1C1917"/>
          <rect x="97" y="13" width="20" height="20" rx="2" fill="white"/>
          <rect x="101" y="17" width="12" height="12" rx="1.5" fill="#1C1917"/>
          <rect x="8"  y="92" width="30" height="30" rx="4" fill="#1C1917"/>
          <rect x="13" y="97" width="20" height="20" rx="2" fill="white"/>
          <rect x="17" y="101" width="12" height="12" rx="1.5" fill="#1C1917"/>
          <!-- 数据点阵 -->
          <rect x="46" y="8"  width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="56" y="8"  width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="66" y="8"  width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="76" y="8"  width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="46" y="18" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="66" y="18" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="56" y="28" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="76" y="28" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="8"  y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="20" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="34" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="46" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="60" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="74" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="88" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="104" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="116" y="46" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="8"  y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="26" y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="50" y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="68" y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="84" y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="102" y="58" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="18" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="34" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="54" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="74" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="90" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="112" y="68" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="8"  y="78" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="46" y="78" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="62" y="78" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="78" y="78" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="98" y="78" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="46" y="92" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="60" y="92" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="76" y="92" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="92" y="92" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="108" y="92" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="54" y="104" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="70" y="104" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="86" y="104" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="102" y="104" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="46" y="116" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="64" y="116" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="80" y="116" width="6" height="6" rx="1" fill="#1C1917"/>
          <rect x="98" y="116" width="6" height="6" rx="1" fill="#1C1917"/>
          <!-- 中心 logo -->
          <rect x="54" y="54" width="22" height="22" rx="6" fill="white"/>
          <rect x="55" y="55" width="20" height="20" rx="5" fill="url(#g1)"/>
          <defs>
            <linearGradient id="g1" x1="55" y1="55" x2="75" y2="75">
              <stop offset="0%" stop-color="#FCD34D"/>
              <stop offset="100%" stop-color="#F97316"/>
            </linearGradient>
          </defs>
        </svg>

        <!-- 扫码成功遮罩 -->
        <div id="qr-success" class="qr-success hidden">
          <div class="success-circle">
            <svg viewBox="0 0 24 24" fill="none" width="32" height="32">
              <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="success-text">扫码成功</div>
        </div>
      </div>

      <div class="wechat-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M8.5 11.5a.75.75 0 100-1.5.75.75 0 000 1.5zm5 0a.75.75 0 100-1.5.75.75 0 000 1.5z" fill="#07C160"/><path d="M21 11c0-4.142-3.857-7.5-8.5-7.5S4 6.858 4 11c0 2.35 1.14 4.356 2.93 5.756L6.5 20l3.07-1.588A9.8 9.8 0 0012.5 18.5C17.143 18.5 21 15.142 21 11z" fill="#07C160"/></svg>
        微信扫一扫
      </div>
      <div class="qr-sub">使用微信扫描上方二维码</div>
      <div class="countdown-wrap hidden" id="countdown-wrap">
        <div id="countdown-bar" class="countdown-bar"></div>
        <span id="countdown-text" class="countdown-text">模拟扫码中…3s 后自动登录</span>
      </div>
    </div>

    <div class="login-footer">
      登录即视为同意服务协议。首次扫码自动创建账号，数据与小程序互通。
    </div>
  </div>
</div>

<!-- ═══ 主视图（添加当前页） ═══ -->
<div id="view-main" class="view hidden">
  <!-- 顶栏 -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></div>
      <span class="topbar-name">拾光</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="btn-goto-search" title="搜索">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="btn-logout" title="退出登录">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- 当前页面卡片 -->
  <div class="section-label">当前页面</div>
  <div class="page-card" id="page-card">
    <div class="page-card-loading" id="page-loading">
      <div class="spinner"></div>
      <span>获取页面信息…</span>
    </div>
    <div id="page-info" class="hidden">
      <div class="page-meta">
        <img id="page-favicon" class="favicon" src="" alt=""/>
        <span id="page-source" class="page-source"></span>
        <span id="page-readtime" class="page-readtime"></span>
      </div>
      <div id="page-title" class="page-title"></div>
      <!-- AI 摘要区 -->
      <div class="ai-summary-card" id="ai-card">
        <div class="ai-card-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z" fill="#F97316"/></svg>
          <span class="ai-label">AI 摘要</span>
          <span class="ai-badge">预览</span>
        </div>
        <div id="ai-summary-text" class="ai-text"></div>
        <div id="ai-tags" class="tag-row"></div>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div id="btn-add-wrap">
    <button class="btn-primary" id="btn-add">
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      添加到拾光
    </button>
    <div id="add-feedback" class="add-feedback hidden"></div>
  </div>

  <!-- 底部导航 -->
  <div class="bottom-nav">
    <button class="nav-item active" data-view="main">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>主页</span>
    </button>
    <button class="nav-item" data-view="list">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>收藏</span>
    </button>
    <button class="nav-item" data-view="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>搜索</span>
    </button>
  </div>
</div>

<!-- ═══ 收藏列表视图 ═══ -->
<div id="view-list" class="view hidden">
  <div class="topbar">
    <div class="topbar-brand">
      <button class="icon-btn" id="btn-list-back">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="topbar-name">收藏列表</span>
    </div>
    <span id="list-count" class="list-count"></span>
  </div>

  <div class="list-search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="list-search-input" class="list-search-input" type="text" placeholder="搜索收藏内容…"/>
    <button id="list-search-clear" class="search-clear hidden">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div id="tag-tabs" class="tag-tabs"></div>

  <div id="list-items" class="list-items"></div>

  <div class="bottom-nav">
    <button class="nav-item" data-view="main">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>主页</span>
    </button>
    <button class="nav-item active" data-view="list">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>收藏</span>
    </button>
    <button class="nav-item" data-view="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>搜索</span>
    </button>
  </div>
</div>

<!-- ═══ 搜索视图 ═══ -->
<div id="view-search" class="view hidden">
  <div class="topbar">
    <div class="topbar-brand">
      <button class="icon-btn" id="btn-search-back">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <span class="topbar-name">搜索</span>
    </div>
  </div>

  <div class="search-bar-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="search-input" class="search-input" type="text" placeholder="搜索标题、摘要、标签…" autofocus/>
  </div>

  <div id="search-results" class="list-items">
    <div class="search-empty">
      <svg viewBox="0 0 24 24" fill="none" width="40" height="40"><circle cx="11" cy="11" r="7" stroke="#D6D3D1" stroke-width="1.5"/><path d="M20 20l-3-3" stroke="#D6D3D1" stroke-width="1.5" stroke-linecap="round"/></svg>
      <p>输入关键词搜索你的收藏</p>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item" data-view="main">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>主页</span>
    </button>
    <button class="nav-item" data-view="list">
      <svg viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>收藏</span>
    </button>
    <button class="nav-item active" data-view="search">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>搜索</span>
    </button>
  </div>
</div>

<script src="storage.js"></script>
<script src="api.js"></script>
<script src="popup.js"></script>
</body>
</html>
