<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Samples · 产品演示集</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
<style>
  :root{
    --bg:#f8f6f3;
    --bg-card:#ffffff;
    --ink:#1c1917;
    --ink-dim:#78716c;
    --ink-soft:#a8a29e;
    --line:rgba(0,0,0,.08);
    --shadow:0 4px 24px -4px rgba(0,0,0,.06);
    --shadow-hover:0 24px 48px -12px rgba(0,0,0,.12);
  }
  *{ -webkit-font-smoothing:antialiased; }
  html,body{ background:var(--bg); color:var(--ink); font-family:'Inter','Noto Serif SC',system-ui,sans-serif; }
  .serif{ font-family:'Noto Serif SC',serif; }
  .material-icons-round{ font-family:'Material Icons Round'; }

  /* ambient background */
  .ambient{
    position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none;
  }
  .ambient::before,
  .ambient::after{
    content:""; position:absolute; border-radius:50%; filter:blur(140px); opacity:.25;
  }
  .ambient::before{
    width:500px; height:500px; left:-120px; top:-100px;
    background:radial-gradient(circle, #f5e6d3 0%, transparent 70%);
  }
  .ambient::after{
    width:600px; height:600px; right:-180px; bottom:-180px;
    background:radial-gradient(circle, #e0d8f0 0%, transparent 70%);
  }
  .grain{ display:none; }

  /* card */
  .card{
    position:relative; border:1px solid var(--line); border-radius:24px;
    background:var(--bg-card);
    overflow:hidden; transition:transform .5s cubic-bezier(.2,.8,.2,1), border-color .3s, box-shadow .5s;
    box-shadow:var(--shadow);
  }
  .card::after{
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    box-shadow:0 0 0 0 var(--accent, transparent);
    transition:box-shadow .5s;
  }
  .card:hover{
    transform:translateY(-6px);
    border-color:rgba(0,0,0,.12);
    box-shadow:var(--shadow-hover);
  }
  .card:hover::after{
    box-shadow:0 30px 50px -25px var(--accent);
  }
  .card .cover{
    position:relative; aspect-ratio:16/10; overflow:hidden;
    border-bottom:1px solid var(--line);
  }
  .card .cover .layer{
    position:absolute; inset:0;
    transition:transform .8s cubic-bezier(.2,.8,.2,1), opacity .5s;
  }
  /* tinted gradient cover */
  .cover-tint{
    background:
      radial-gradient(120% 80% at 100% 0%, var(--tint-strong) 0%, transparent 55%),
      radial-gradient(140% 100% at 0% 100%, var(--tint-soft) 0%, transparent 60%),
      linear-gradient(180deg, #ffffff, #fbfaf8);
  }
  /* large watermark glyph */
  .watermark{
    position:absolute; right:-30px; bottom:-40px;
    font-size:240px; line-height:1; opacity:.06;
    color:var(--accent); pointer-events:none;
    transform:rotate(-8deg); transition:transform .8s cubic-bezier(.2,.8,.2,1), opacity .5s;
  }
  .card:hover .watermark{
    transform:rotate(-4deg) scale(1.08); opacity:.1;
  }
  /* dotted pattern overlay */
  .dots{
    position:absolute; top:18px; right:18px;
    width:96px; height:36px; opacity:.5;
    background-image:radial-gradient(circle, var(--ink-soft) 1px, transparent 1.2px);
    background-size:8px 8px;
    -webkit-mask-image:linear-gradient(to right, transparent, #000 30%, #000 70%, transparent);
            mask-image:linear-gradient(to right, transparent, #000 30%, #000 70%, transparent);
  }
  /* index number */
  .index-num{
    position:absolute; top:16px; left:18px;
    font-family:'Noto Serif SC', serif;
    font-size:13px; font-weight:500; letter-spacing:.04em;
    color:var(--ink-dim);
  }
  .index-num span{ color:var(--ink-soft); }

  /* icon chip — repositioned bottom-left */
  .card .cover .icon-wrap{
    position:absolute; left:24px; bottom:24px; z-index:2;
  }
  .icon-chip{
    width:54px; height:54px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px -2px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .8s cubic-bezier(.2,.8,.2,1), box-shadow .4s;
  }
  .card:hover .cover .icon-chip{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 12px 28px -4px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .icon-chip .material-icons-round{
    font-size:26px; color:#fff;
  }

  /* tag pill — bottom-right of cover */
  .card .cover .badge{
    position:absolute; right:18px; bottom:24px; z-index:2;
    background:rgba(255,255,255,.85); backdrop-filter:blur(12px);
    border:1px solid rgba(0,0,0,.06); color:var(--ink-dim);
    padding:5px 11px; border-radius:999px; font-size:10px; letter-spacing:.12em;
    text-transform:uppercase; font-weight:600;
  }
  .card .meta{ padding:24px 26px 26px; }
  .card .title-cn{ font-size:24px; font-weight:700; letter-spacing:-.015em; line-height:1.2; }
  .card .title-en{ font-size:11px; color:var(--ink-soft); letter-spacing:.22em; text-transform:uppercase; margin-bottom:10px; font-weight:500; }
  .card .desc{ color:var(--ink-dim); font-size:13.5px; line-height:1.7; min-height:48px; margin-top:10px; }
  .card .footline{
    margin-top:20px; padding-top:16px;
    border-top:1px dashed var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .card .open{
    display:inline-flex; align-items:center; gap:6px;
    color:var(--ink); font-size:13px; font-weight:500; opacity:.75;
    transition:gap .3s, opacity .3s, color .3s;
  }
  .card:hover .open{ gap:12px; opacity:1; color:var(--accent-deep, var(--ink)); }
  .card .stripe{
    display:flex; gap:3px;
  }
  .card .stripe span{
    width:3px; height:14px; border-radius:2px; background:var(--accent); opacity:.7;
  }
  .card .stripe span:nth-child(1){ height:10px; opacity:.4; }
  .card .stripe span:nth-child(2){ height:14px; opacity:.7; }
  .card .stripe span:nth-child(3){ height:18px; opacity:1; }

  /* logo dots */
  .logo-dot{
    width:8px; height:8px; border-radius:50%;
    box-shadow:0 0 12px currentColor;
  }

  /* footer */
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border:1px solid var(--line); border-radius:999px;
    font-size:12px; color:var(--ink-dim); background:var(--bg-card);
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="grain"></div>

<!-- Header -->
<header class="max-w-6xl mx-auto px-6 pt-10 pb-6 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="relative w-9 h-9 rounded-full" style="background:conic-gradient(from 210deg, #c9a36b, #6a6cf0, #e88ea0, #c9a36b);">
      <div class="absolute inset-1 rounded-full bg-white"></div>
      <div class="absolute inset-0 flex items-center justify-center serif font-bold text-sm">S</div>
    </div>
    <div class="leading-tight">
      <div class="text-sm font-semibold tracking-wide">Samples</div>
      <div class="text-xs" style="color:var(--ink-dim)">产品演示集 · Product Showcase</div>
    </div>
  </div>
  <div class="hidden md:flex items-center gap-2">
    <span class="pill"><span class="material-icons-round" style="font-size:14px;">apps</span><span id="count">6</span> projects</span>
    <span class="pill"><span class="material-icons-round" style="font-size:14px;">schedule</span>updated 2026</span>
  </div>
</header>

<!-- Hero -->
<section class="max-w-6xl mx-auto px-6 pt-10 pb-14">
  <p class="text-xs tracking-[.25em] uppercase mb-5" style="color:var(--ink-soft)">A collection of product demos</p>
  <h1 class="serif text-5xl md:text-7xl font-bold leading-[1.05] tracking-tight">
    安静地<br/>
    <span style="background:linear-gradient(90deg,#c9a36b,#e88ea0,#6a6cf0); -webkit-background-clip:text; background-clip:text; color:transparent;">把每一个想法</span><br/>
    做成一个产品。
  </h1>
  <p class="mt-6 max-w-xl text-base md:text-lg leading-relaxed" style="color:var(--ink-dim);">
    这里收录了一系列独立的产品概念演示页。点击任意卡片，进入对应项目的完整 demo。
  </p>
</section>

<!-- Grid -->
<main class="max-w-6xl mx-auto px-6 pb-24">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-7" id="grid">
    <!-- cards injected by JS -->
  </div>
</main>

<!-- Footer -->
<footer class="border-t" style="border-color:var(--line);">
  <div class="max-w-6xl mx-auto px-6 py-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
    <div class="text-sm" style="color:var(--ink-dim)">
      © 2026 Samples · Each project is an independent product concept demo.
    </div>
    <div class="flex items-center gap-2">
      <span class="logo-dot" style="color:#c9a36b; background:#c9a36b;"></span>
      <span class="logo-dot" style="color:#4f7a4a; background:#4f7a4a;"></span>
      <span class="logo-dot" style="color:#6a6cf0; background:#6a6cf0;"></span>
      <span class="logo-dot" style="color:#e88ea0; background:#e88ea0;"></span>
      <span class="logo-dot" style="color:#5a4a8a; background:#5a4a8a;"></span>
      <span class="logo-dot" style="color:#2c5d9c; background:#2c5d9c;"></span>
    </div>
  </div>
</footer>

<script>
  const projects = [
    {
      slug: 'lumio',
      cn: '拾光',
      en: 'Lumio',
      tag: 'Content · Discovery',
      desc: '让好内容，在对的时刻找到你。一个把阅读还给慢节奏的发现器。',
      icon: 'auto_stories',
      iconBg: 'linear-gradient(135deg,#FCD34D,#F97316)',
      accent: '#F97316',
      accentDeep: '#9A3412',
      tintSoft: 'rgba(252,211,77,.18)',
      tintStrong: 'rgba(249,115,22,.12)',
    },
    {
      slug: 'mori',
      cn: '山野绘本',
      en: 'Mori',
      tag: 'Travel · Family',
      desc: '把每一次出门，画成一张童话地图。给孩子的户外探索手账。',
      icon: 'forest',
      iconBg: 'linear-gradient(135deg,#5a8f5a,#2f5a2f)',
      accent: '#4f7a4a',
      accentDeep: '#1f3a1c',
      tintSoft: 'rgba(184,216,168,.28)',
      tintStrong: 'rgba(79,122,74,.10)',
    },
    {
      slug: 'murmur',
      cn: '轻声',
      en: 'Murmur',
      tag: 'Wellness · Journal',
      desc: '深夜情绪的安全出口。一个只属于你的、低声说话的地方。',
      icon: 'hearing',
      iconBg: 'linear-gradient(135deg,#C4B5FD,#7C3AED)',
      accent: '#7C3AED',
      accentDeep: '#4C1D95',
      tintSoft: 'rgba(196,181,253,.28)',
      tintStrong: 'rgba(124,58,237,.10)',
    },
    {
      slug: 'nudge',
      cn: '温柔的提醒',
      en: 'Nudge',
      tag: 'Habits · Care',
      desc: '不是 to-do，不是闹钟。一种柔软的、像朋友拍拍你的提醒方式。',
      icon: 'favorite_border',
      iconBg: 'linear-gradient(135deg,#F4725B,#E0653B)',
      accent: '#E0653B',
      accentDeep: '#9A2F12',
      tintSoft: 'rgba(244,114,91,.20)',
      tintStrong: 'rgba(224,101,59,.10)',
    },
    {
      slug: 'resona',
      cn: '笔替',
      en: 'Resona',
      tag: 'Writing · AI',
      desc: '借他人之笔，写你想说的话。让表达更接近你想成为的样子。',
      icon: 'draw',
      iconBg: 'linear-gradient(135deg,#A78BFA,#6D28D9)',
      accent: '#6D28D9',
      accentDeep: '#3B1078',
      tintSoft: 'rgba(167,139,250,.24)',
      tintStrong: 'rgba(109,40,217,.10)',
    },
    {
      slug: 'xcontract',
      cn: '智能合同',
      en: 'XContract',
      tag: 'Enterprise · AI',
      desc: '把繁琐的合同审阅，交给更聪明的方式处理。',
      icon: 'description',
      iconBg: 'linear-gradient(135deg,#FB7185,#BE123C)',
      accent: '#BE123C',
      accentDeep: '#7E0A26',
      tintSoft: 'rgba(251,113,133,.22)',
      tintStrong: 'rgba(190,18,60,.10)',
    },
  ];

  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = projects.length;

  projects.forEach((p, i) => {
    const a = document.createElement('a');
    a.href = `./${p.slug}/index.html`;
    a.className = 'card animate__animated animate__fadeInUp';
    a.style.animationDelay = `${i * 70}ms`;
    a.style.setProperty('--accent', p.accent);
    a.style.setProperty('--accent-deep', p.accentDeep);
    a.style.setProperty('--tint-soft', p.tintSoft);
    a.style.setProperty('--tint-strong', p.tintStrong);
    const num = String(i + 1).padStart(2, '0');
    a.innerHTML = `
      <div class="cover">
        <div class="layer cover-tint"></div>
        <span class="material-icons-round watermark">${p.icon}</span>
        <div class="dots"></div>
        <div class="index-num">N<span>°</span> ${num}</div>
        <div class="icon-wrap">
          <div class="icon-chip" style="background:${p.iconBg};">
            <span class="material-icons-round">${p.icon}</span>
          </div>
        </div>
        <div class="badge">${p.tag}</div>
      </div>
      <div class="meta">
        <div class="title-en">${p.en}</div>
        <div class="title-cn serif">${p.cn}</div>
        <p class="desc">${p.desc}</p>
        <div class="footline">
          <span class="open">
            打开项目
            <span class="material-icons-round" style="font-size:18px;">arrow_forward</span>
          </span>
          <div class="stripe"><span></span><span></span><span></span></div>
        </div>
      </div>
    `;
    grid.appendChild(a);
  });
</script>
</body>
</html>
