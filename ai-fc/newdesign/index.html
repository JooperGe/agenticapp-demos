<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI FC — M1 垂直切片</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #121212; color: #eee; }
    .wrap { display: flex; gap: 12px; padding: 12px; }
    .left { flex: 0 0 auto; }
    .right { flex: 1 1 auto; display: flex; flex-direction: column; gap: 8px; min-width: 280px; }
    canvas { background: #1b1b1b; border: 1px solid #333; display: block; }
    .bar { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
    button { background: #2e7d32; color: #fff; border: 0; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #388e3c; }
    #status { font-size: 13px; color: #9ccc65; }
    #selected { font-size: 12px; color: #ffb74d; }
    .box { background: #1b1b1b; border: 1px solid #333; border-radius: 4px; padding: 8px; }
    #events { height: 220px; overflow-y: auto; font-family: monospace; font-size: 11px; line-height: 1.5; }
    #trace { white-space: pre; font-family: monospace; font-size: 12px; height: 200px; overflow: auto; }
    #traceTimeline { white-space: pre; font-family: monospace; font-size: 11px; line-height: 1.5; height: 240px; overflow: auto; }
    h3 { margin: 0 0 6px; font-size: 13px; color: #90caf9; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="bar">
        <button id="btnStart">开始</button>
        <button id="btnPause">暂停</button>
        <button id="btnStep">单步</button>
        <button id="btnExport">导出决策(JSON)</button>
        <span id="selected">点击球员查看决策</span>
      </div>
      <canvas id="pitch" width="920" height="620"></canvas>
      <div id="status" class="box"></div>
    </div>
    <div class="right">
      <div class="box">
        <h3>事件时间线（裁判广播）</h3>
        <div id="events"></div>
      </div>
      <div class="box">
        <h3>选中球员 · 效用打分（最近一次决策）</h3>
        <div id="trace">（点击场上球员）</div>
      </div>
      <div class="box">
        <h3>选中球员 · 每帧决策时间线 <span id="traceCount" style="color:#888;font-weight:normal"></span></h3>
        <div id="traceTimeline"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
